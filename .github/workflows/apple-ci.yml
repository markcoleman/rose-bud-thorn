name: Apple CI

on:
  pull_request:
    paths:
      - "Package.swift"
      - "Sources/**"
      - "Tests/**"
      - "Fixtures/**"
      - "App/**"
      - "scripts/**"
      - "UITests/**"
      - "ci_scripts/**"
      - "RoseBudThorn.xcodeproj/**"
      - "RoseBudThorn.xcworkspace/**"
      - ".github/workflows/apple-ci.yml"
  push:
    branches:
      - main
    paths:
      - "Package.swift"
      - "Sources/**"
      - "Tests/**"
      - "Fixtures/**"
      - "App/**"
      - "scripts/**"
      - "UITests/**"
      - "ci_scripts/**"
      - "RoseBudThorn.xcodeproj/**"
      - "RoseBudThorn.xcworkspace/**"
      - ".github/workflows/apple-ci.yml"
  workflow_dispatch:

concurrency:
  group: apple-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect impacted CI areas
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.filter.outputs.package }}
      app: ${{ steps.filter.outputs.app }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Filter changed files
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            package:
              - 'Package.swift'
              - 'Sources/**'
              - 'Tests/**'
              - 'Fixtures/**'
              - 'scripts/**'
            app:
              - 'App/**'
              - 'Sources/**'
              - 'scripts/**'
              - 'RoseBudThorn.xcodeproj/**'
              - 'RoseBudThorn.xcworkspace/**'
              - 'ci_scripts/**'
            ui:
              - 'App/**'
              - 'Sources/**'
              - 'scripts/**'
              - 'UITests/**'
              - 'RoseBudThorn.xcodeproj/**'
              - 'RoseBudThorn.xcworkspace/**'

  package-test:
    name: Swift package build + test
    runs-on: macos-26
    needs: changes
    if: needs.changes.outputs.package == 'true'
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-spm-

      - name: Run package checks
        run: scripts/ci/package-checks.sh

  build-app:
    name: Build app (${{ matrix.lane }})
    runs-on: macos-26
    needs: changes
    if: needs.changes.outputs.app == 'true'
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: iOS
            lane_id: ios
          - lane: Mac Catalyst
            lane_id: maccatalyst

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1
        with:
          xcode-version: latest-stable

      - name: Build app
        run: scripts/ci/app-build.sh "${{ matrix.lane_id }}"

  ui-smoke:
    name: UI smoke test
    runs-on: macos-26
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.ui == 'true'
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1
        with:
          xcode-version: latest-stable

      - name: Run UI smoke test
        run: scripts/ci/ui-smoke.sh

      - name: Upload UI smoke xcresult on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: xcresult-ui-smoke
          path: /tmp/RoseBudThorn-ui-smoke.xcresult
