name: Nightly Canary

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-canary-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  os26-canary:
    name: OS26 canary checks
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Swift package checks (strict)
        run: scripts/ci/package-checks.sh

      - name: Build iOS app
        run: scripts/ci/app-build.sh ios

      - name: Build Mac Catalyst app
        run: scripts/ci/app-build.sh maccatalyst

      - name: Run full UI suite
        run: scripts/ci/ui-full.sh

      - name: Upload nightly UI xcresult on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: xcresult-ui-nightly
          path: /tmp/RoseBudThorn-ui-nightly.xcresult
