name: Workflow Lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"
      - "actionlint.yml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "actionlint.yaml"
      - "actionlint.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Validate GitHub Actions workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1
