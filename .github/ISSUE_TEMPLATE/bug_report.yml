name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: Briefly describe the bug and expected behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps so someone else can reproduce this.
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: How severe is this and who is affected?
      placeholder: Crash, data loss risk, blocker, etc.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include app version, OS/device, and build details.
      placeholder: iOS 26.0 simulator, Xcode 26.x, branch, commit SHA.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant logs or attach screenshots if available.
      render: shell
    validations:
      required: false
