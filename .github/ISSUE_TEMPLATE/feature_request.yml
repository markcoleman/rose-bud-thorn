name: Feature request
description: Propose an enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or product problem are you trying to solve?
      placeholder: Describe the pain point and current limitation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the proposed behavior and expected outcome.
      placeholder: Describe the ideal user flow or API.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternate approaches or workarounds tried?
      placeholder: List alternatives and why they were not chosen.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What should be true for this request to be done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
